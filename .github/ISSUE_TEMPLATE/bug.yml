name: Bug Report
description: Report broken agent loading, tool filtering, or prompt injection
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Keep this concise. Include the agent file, env var, and pi command needed to reproduce.

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Include exact output/errors.
    validations:
      required: true

  - type: textarea
    id: agent
    attributes:
      label: Agent definition
      description: Paste a minimal agent markdown file that reproduces the issue.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: pi-agent-system version
      placeholder: 0.1.0
    validations:
      required: false

  - type: input
    id: pi-version
    attributes:
      label: pi-coding-agent version
      placeholder: 0.74.0
    validations:
      required: false
